<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بساتين - الفخامة الطازجة</title>
    <style>
        :root { --olive: #556b2f; --gold: #c5a059; --bg: #fdfdf5; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; }

        /* صفحة الترحيب */
        #welcome-page { position: fixed; top:0; left:0; width: 100%; height: 100%; background: var(--olive); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; color: white; padding: 20px; text-align: center; }
        .welcome-text { font-size: 26px; font-weight: bold; margin-bottom: 20px; line-height: 1.8; }
        .shop-btn { padding: 20px 50px; background: var(--gold); border-radius: 50px; border: none; font-size: 24px; cursor: pointer; color: white; font-weight: bold; margin-top: 20px; }

        /* المتجر */
        #main-app { display: none; padding-bottom: 120px; }
        .hero { background: var(--olive); padding: 20px; text-align: center; color: white; }
        .banner { width: 90%; max-width: 600px; display: block; margin: 20px auto; border-radius: 15px; border: 3px solid var(--gold); }
        .nav-bar { position: sticky; top: 0; background: white; padding: 15px; display: flex; justify-content: center; gap: 10px; z-index: 1000; box-shadow: 0 4px 6px rgba(0,0,0,0.1); flex-wrap: wrap; }
        .nav-btn { padding: 10px 15px; border-radius: 15px; border: 1px solid var(--olive); color: var(--olive); font-weight: bold; cursor: pointer; background: white; }
        .nav-btn.active { background: var(--olive); color: white; }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(5, 1fr); } }
        
        .card { background: white; padding: 15px; border-radius: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-size: 14px; border: 2px solid #eee; cursor: pointer; }
        .card.selected { border-color: var(--gold); background: #fdfdf5; }
        #checkout-bar { position: fixed; bottom: 0; width: 100%; background: var(--olive); color: white; text-align: center; padding: 15px; font-weight: bold; display: none; z-index: 2000; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>

    <div id="welcome-page">
        <div style="font-size: 80px;">👨‍🌾</div>
        <div class="welcome-text">مرحباً بك في متجر بساتين 🌿<br>حيث الفخامة تلتقي بالطبيعة الطازجة</div>
        <button class="shop-btn" onclick="startShopping()">تسوق الآن</button>
    </div>

    <div id="main-app">
        <header class="hero"><h1>بـسـاتـيـن</h1></header>
        <img src="https://i.top4top.io/p_3823lll7f0.png" class="banner">
        
        <nav class="nav-bar" id="nav">
            <button class="nav-btn active" onclick="render('الكل', this)">الكل</button>
            <button class="nav-btn" onclick="render('صناديق', this)">صناديق</button>
            <button class="nav-btn" onclick="render('فواكه', this)">فواكه</button>
            <button class="nav-btn" onclick="render('خضروات', this)">خضروات</button>
        </nav>
        <div class="grid" id="grid"></div>
        <div id="checkout-bar" onclick="sendOrder()">إتمام الطلب النهائي 🛒</div>
    </div>

    <script>
        let selectedItems = [];
        const products = [
            {n: "صندوق متكامل 🧺", c: "صناديق"}, {n: "صندوق الفواكه 🎁", c: "صناديق"}, {n: "صندوق الخضار 📦", c: "صناديق"},
            {n: "تفاح أخضر 🍏", c: "فواكه"}, {n: "تفاح أحمر 🍎", c: "فواكه"}, {n: "إجاص 🍐", c: "فواكه"}, {n: "برتقال 🍊", c: "فواكه"}, {n: "بطيخ 🍉", c: "فواكه"},
            {n: "موز 🍌", c: "فواكه"}, {n: "ليمون أخضر 🍋‍🟩", c: "فواكه"}, {n: "عنب 🍇", c: "فواكه"}, {n: "فراولة 🍓", c: "فواكه"}, {n: "توت 🫐", c: "فواكه"},
            {n: "شمام 🍈", c: "فواكه"}, {n: "أناناس 🍍", c: "فواكه"}, {n: "مانجو 🥭", c: "فواكه"}, {n: "خوخ 🍑", c: "فواكه"}, {n: "كرز 🍒", c: "فواكه"}, {n: "كيوي 🥝", c: "فواكه"},
            {n: "طماطم 🍅", c: "خضروات"}, {n: "باذنجان 🍆", c: "خضروات"}, {n: "خس 🥬", c: "خضروات"}, {n: "بروكلي 🥦", c: "خضروات"},
            {n: "بازلاء 🫛", c: "خضروات"}, {n: "أفوكادو 🥑", c: "خضروات"}, {n: "خيار 🥒", c: "خضروات"}, {n: "فلفل حار 🌶️", c: "خضروات"}, {n: "فلفل بارد 🫑", c: "خضروات"},
            {n: "ذرة 🌽", c: "خضروات"}, {n: "بصل 🧅", c: "خضروات"}, {n: "ثوم 🧄", c: "خضروات"}, {n: "زيتون 🫒", c: "خضروات"}, {n: "جزر 🥕", c: "خضروات"},
            {n: "بطاطس 🥔", c: "خضروات"}, {n: "بطاطا حلوة 🍠", c: "خضروات"}
        ];

        function startShopping() {
            document.getElementById('welcome-page').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            render('الكل');
        }

        function toggleSelect(name, card) {
            if(selectedItems.includes(name)) {
                selectedItems = selectedItems.filter(i => i !== name);
                card.classList.remove('selected');
            } else {
                selectedItems.push(name);
                card.classList.add('selected');
            }
            document.getElementById('checkout-bar').style.display = selectedItems.length > 0 ? 'block' : 'none';
            document.getElementById('checkout-bar').innerText = `إتمام الطلب النهائي (${selectedItems.length}) 🛒`;
        }

        function render(cat, btn) {
            if(btn) {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            products.filter(i => cat === 'الكل' || i.c === cat).forEach(item => {
                const isSelected = selectedItems.includes(item.n);
                grid.innerHTML += `
                    <div class="card ${isSelected ? 'selected' : ''}" onclick="toggleSelect('${item.n}', this)">
                        <div>${item.n}</div>
                    </div>
                `;
            });
        }

        function sendOrder() {
            window.open(`https://wa.me/96598523539?text=أريد طلب: ${selectedItems.join(', ')} من بساتين.`);
        }
    </script>
</body>
</html>
