<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بساتين - الفخامة الطازجة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background: #f0fdf4; overflow-x: hidden; }
        .fancy-title { font-family: 'Amiri', serif; }
    </style>
</head>
<body>

<div id="root"></div>

<script type="module">
    import React, { useState } from 'https://esm.sh/react';
    import ReactDOM from 'https://esm.sh/react-dom';
    const { motion, AnimatePresence } = window.framerMotion;

    const storeData = {
        "فواكه": ["موز 🍌", "تفاح 🍎", "برتقال 🍊", "مانجو 🥭", "فراولة 🍓", "كيوي 🥝", "عنب 🍇"],
        "خضروات": ["طماطم 🍅", "خيار 🥒", "جزر 🥕", "بصل 🧅", "فلفل 🫑", "بروكلي 🥦", "بطاطس 🥔"]
    };

    function App() {
        const [showShop, setShowShop] = useState(false);
        const [activeTab, setActiveTab] = useState("فواكه");

        return (
            <div className="min-h-screen">
                <AnimatePresence mode="wait">
                    {!showShop ? (
                        /* صفحة الترحيب */
                        <motion.div key="welcome" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0, scale: 0.8 }}
                            className="h-screen flex flex-col justify-center items-center text-center p-6 bg-gradient-to-br from-green-700 to-green-900 text-white">
                            <motion.img src="https://k.top4top.io/p_3823l4r0s0.png" initial={{ y: -50 }} animate={{ y: 0 }} className="w-40 mb-6" />
                            <h1 className="fancy-title text-6xl mb-4">بساتين</h1>
                            <p className="mb-10 text-xl opacity-80">أجود المحاصيل من أرضنا إلى مائدتك</p>
                            <button onClick={() => setShowShop(true)} className="bg-white text-green-900 px-10 py-4 rounded-full font-bold text-lg hover:scale-110 transition shadow-xl">
                                تسوق الآن 🛒
                            </button>
                        </motion.div>
                    ) : (
                        /* صفحة المتجر */
                        <motion.div key="shop" initial={{ y: 100 }} animate={{ y: 0 }} className="p-4 md:p-10">
                            <nav className="flex justify-between items-center mb-10 bg-white p-4 rounded-2xl shadow-md sticky top-0 z-50">
                                <h2 className="fancy-title text-2xl text-green-800">بساتين</h2>
                                <div className="flex gap-2">
                                    {Object.keys(storeData).map(tab => (
                                        <button key={tab} onClick={() => setActiveTab(tab)} 
                                            className={`px-4 py-2 rounded-xl font-bold ${activeTab === tab ? 'bg-green-700 text-white' : 'bg-gray-100'}`}>
                                            {tab}
                                        </button>
                                    ))}
                                </div>
                            </nav>

                            <div className="grid grid-cols-2 md:grid-cols-4 gap-6">
                                {storeData[activeTab].map((item, i) => (
                                    <motion.div key={item} initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} transition={{ delay: i * 0.1 }}
                                        className="bg-white p-6 rounded-3xl shadow-lg border border-green-50 text-center hover:scale-105 transition">
                                        <div className="text-5xl mb-4">{item.split(" ")[1]}</div>
                                        <h3 className="font-bold text-gray-700 mb-4">{item.split(" ")[0]}</h3>
                                        <button onClick={() => window.location.href=`https://wa.me/96598523539?text=أريد طلب: ${item}`}
                                            className="w-full bg-green-500 text-white py-2 rounded-xl font-bold">طلب واتساب</button>
                                    </motion.div>
                                ))}
                            </div>
                        </motion.div>
                    )}
                </AnimatePresence>
            </div>
        );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
