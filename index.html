<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بساتين - الفخامة الطازجة</title>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <style>
        /* ==================================================
           تنسيقات CSS المطولة لضمان ثقل الموقع وفخامته
           ==================================================
        */
        :root {
            --color-olive: #556b2f;
            --color-gold: #c5a059;
            --color-bg: #fdfdf5;
            --color-white: #ffffff;
            --transition-smooth: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--color-bg);
            margin: 0;
            padding: 0;
            padding-bottom: 150px;
        }

        .header-section {
            background-color: var(--color-olive);
            padding: 50px 20px;
            text-align: center;
            color: var(--color-white);
            border-bottom: 6px solid var(--color-gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .header-title {
            font-size: 55px;
            font-weight: 800;
            letter-spacing: 2px;
            margin: 0;
        }

        .main-banner {
            width: 95%;
            max-width: 550px;
            display: block;
            margin: 30px auto;
            border-radius: 20px;
            border: 3px solid var(--color-gold);
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
        }

        .navigation-sticky {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .nav-button {
            padding: 12px 30px;
            border-radius: 40px;
            border: 2px solid var(--color-olive);
            background: var(--color-white);
            color: var(--color-olive);
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .nav-button.active {
            background: var(--color-olive);
            color: var(--color-white);
            transform: scale(1.05);
        }

        .product-wrapper {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card-item {
            width: 100%;
            max-width: 500px;
            background: var(--color-white);
            padding: 40px 20px;
            margin-bottom: 25px;
            border-radius: 30px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            color: var(--color-olive);
            border: 4px solid transparent;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .card-item.selected {
            border-color: var(--color-gold);
            background: #fffdf0;
            transform: translateY(-5px);
        }

        .order-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--color-olive);
            color: var(--color-white);
            text-align: center;
            padding: 30px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            z-index: 2000;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.3);
            display: none;
        }
    </style>
</head>
<body>

    <header class="header-section">
        <h1 class="header-title">بـسـاتـيـن</h1>
    </header>

    <img src="https://i.top4top.io/p_3823lll7f0.png" class="main-banner">

    <nav class="navigation-sticky" id="nav-container"></nav>

    <div id="product-display" class="product-wrapper"></div>

    <div id="order-footer" class="order-bar" onclick="sendWhatsApp()">
        إتمام الطلب الآن 🛒
    </div>

    <script>
        /* ==================================================
           المنطق البرمجي: 50 صنفاً مع إدارة الحالة (State)
           ==================================================
        */
        const data = {
            "فواكه": Array.from({length: 20}, (_, i) => `فاكهة طازجة رقم ${i+1} 🍎`),
            "خضروات": Array.from({length: 20}, (_, i) => `خضار عضوي رقم ${i+1} 🥦`),
            "صناديق": Array.from({length: 10}, (_, i) => `صندوق العائلة رقم ${i+1} 🎁`)
        };

        let mySelection = [];

        function renderNav() {
            const nav = document.getElementById('nav-container');
            Object.keys(data).forEach((c, idx) => {
                nav.innerHTML += `<button class="nav-button ${idx==0?'active':''}" onclick="show('${c}', this)">${c}</button>`;
            });
        }

        function show(cat, btn) {
            if(btn) {
                document.querySelectorAll('.nav-button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            const display = document.getElementById('product-display');
            display.innerHTML = '';
            data[cat].forEach(item => {
                let div = document.createElement('div');
                div.className = `card-item ${mySelection.includes(item)?'selected':''}`;
                div.innerText = item;
                div.onclick = function() {
                    this.classList.toggle('selected');
                    if(this.classList.contains('selected')) mySelection.push(item);
                    else mySelection = mySelection.filter(i => i !== item);
                    document.getElementById('order-footer').style.display = mySelection.length > 0 ? 'block' : 'none';
                };
                display.appendChild(div);
            });
        }

        function sendWhatsApp() {
            const text = `مرحباً، أود طلب: ${mySelection.join(', ')} من بساتين.`;
            window.open(`https://wa.me/96598523539?text=${encodeURIComponent(text)}`);
        }

        // تشغيل النظام
        renderNav();
        show('فواكه');
    </script>
</body>
</html>
