<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بساتين - الفخامة الطازجة</title>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --olive: #556b2f; --gold: #c5a059; }
        body { font-family: 'Almarai', sans-serif; background-color: #fdfdf5; margin: 0; padding-bottom: 100px; }
        
        .hero-header { background-color: var(--olive); padding: 40px 20px; text-align: center; color: white; }
        .fancy-text { font-size: 50px; font-weight: bold; }
        .top-image { width: 100%; max-width: 400px; display: block; margin: 20px auto; border-radius: 20px; }

        .category-title { font-size: 24px; color: var(--olive); text-align: center; margin: 30px 0; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 10px; }
        .product-card { 
            background: white; padding: 20px; border-radius: 20px; text-align: center; 
            border: 3px solid transparent; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .product-card.selected { border-color: var(--gold); background: #f9f7e8; }
        
        /* شريط إتمام الطلب */
        #cart-bar { 
            position: fixed; bottom: 0; width: 100%; background: var(--olive); color: white; 
            text-align: center; padding: 20px; font-size: 20px; font-weight: bold; 
            display: none; cursor: pointer; box-shadow: 0 -4px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<div class="hero-header"><div class="fancy-text">بـسـاتـيـن</div></div>
<img src="https://i.top4top.io/p_3823lll7f0.png" class="top-image">

<div id="content"></div>

<div id="cart-bar" onclick="sendOrder()">إتمام الطلب الآن 🛒</div>

<script>
    const store = {
        "الفواكه": ["موز 🍌", "تفاح 🍎", "برتقال 🍊", "مانجو 🥭", "فراولة 🍓"],
        "الخضروات": ["طماطم 🍅", "خيار 🥒", "جزر 🥕", "خس 🥬", "بصل 🧅"],
        "صناديق": ["صندوق العائلة 🎁", "صندوق الضيافة 🧺", "صندوق العيد 📦"]
    };

    let selectedItems = [];
    const content = document.getElementById('content');

    for (let cat in store) {
        content.innerHTML += `<div class="category-title">${cat}</div>`;
        let grid = document.createElement('div');
        grid.className = 'grid';
        store[cat].forEach(item => {
            let div = document.createElement('div');
            div.className = 'product-card';
            div.innerText = item;
            div.onclick = () => {
                div.classList.toggle('selected');
                if(div.classList.contains('selected')) selectedItems.push(item);
                else selectedItems = selectedItems.filter(i => i !== item);
                document.getElementById('cart-bar').style.display = selectedItems.length > 0 ? 'block' : 'none';
            };
            grid.appendChild(div);
        });
        content.appendChild(grid);
    }

    function sendOrder() {
        let msg = `مرحباً، أود طلب: ${selectedItems.join(', ')} من بساتين. بانتظار تأكيدكم..🌿`;
        window.open(`https://wa.me/96598523539?text=${encodeURIComponent(msg)}`, '_blank');
    }
</script>
</body>
</html>
