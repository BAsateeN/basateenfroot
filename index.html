
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بساتين - متجر الخضار</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f4f4f4; padding: 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .product-box { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; }
        img { width: 80px; height: 80px; object-fit: contain; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h1>مرحباً بك في بساتين 🌿</h1>
    <div class="product-grid" id="product-container"></div>

    <script>
        const prods = [
            { name: "طماطم 🍅", img: "https://w7.pngwing.com/pngs/453/566/png-transparent-red-tomato-tomato-food-vegetable-tomato-thumbnail.png" },
            { name: "جزر 🥕", img: "https://w7.pngwing.com/pngs/399/194/png-transparent-carrot-carrot-food-vegetable-nutrition-thumbnail.png" },
            { name: "خيار 🥒", img: "https://w7.pngwing.com/pngs/462/502/png-transparent-cucumber-cucumber-food-vegetable-sliced-thumbnail.png" },
            { name: "بطاطس 🥔", img: "https://w7.pngwing.com/pngs/224/601/png-transparent-potato-potato-food-vegetable-tuber-thumbnail.png" },
            { name: "بصل 🧅", img: "https://w7.pngwing.com/pngs/998/1000/png-transparent-onion-onion-food-vegetable-red-onion-thumbnail.png" },
            { name: "كوسة 🥒", img: "https://w7.pngwing.com/pngs/846/76/png-transparent-zucchini-zucchini-food-vegetable-squash-thumbnail.png" },
            { name: "باذنجان 🍆", img: "https://w7.pngwing.com/pngs/341/303/png-transparent-eggplant-eggplant-food-vegetable-aubergine-thumbnail.png" },
            { name: "فلفل 🫑", img: "https://w7.pngwing.com/pngs/434/418/png-transparent-bell-pepper-green-bell-pepper-vegetable-food-peppers-thumbnail.png" },
            { name: "خس 🥬", img: "https://w7.pngwing.com/pngs/23/16/png-transparent-lettuce-leaf-lettuce-vegetable-food-leaf-vegetable-thumbnail.png" },
            { name: "بروكلي 🥦", img: "https://w7.pngwing.com/pngs/34/183/png-transparent-broccoli-broccoli-food-vegetable-cruciferous-vegetable-thumbnail.png" },
            { name: "ملفوف 🥬", img: "https://w7.pngwing.com/pngs/817/800/png-transparent-cabbage-cabbage-food-vegetable-leaf-vegetable-thumbnail.png" },
            { name: "قرنبيط 🥦", img: "https://w7.pngwing.com/pngs/529/428/png-transparent-cauliflower-cauliflower-food-vegetable-cruciferous-vegetable-thumbnail.png" },
            { name: "فاصوليا 🫛", img: "https://w7.pngwing.com/pngs/940/328/png-transparent-green-beans-green-beans-food-vegetable-pod-thumbnail.png" },
            { name: "ليمون 🍋", img: "https://w7.pngwing.com/pngs/489/40/png-transparent-lemon-lemon-lemon-fruit-food-citrus-thumbnail.png" },
            { name: "ثوم 🧄", img: "https://w7.pngwing.com/pngs/669/893/png-transparent-garlic-garlic-food-vegetable-allium-thumbnail.png" },
            { name: "زنجبيل 🫚", img: "https://w7.pngwing.com/pngs/194/859/png-transparent-ginger-ginger-food-vegetable-root-vegetable-thumbnail.png" }
        ];

        const container = document.getElementById("product-container");
        prods.forEach(p => {
            container.innerHTML += `
                <div class="product-box">
                    <img src="${p.img}" alt="${p.name}">
                    <p>${p.name}</p>
                </div>
            `;
        });

        function goDetails(name) { alert("أهلاً بك في تفاصيل: " + name); }
    </script>
</body>
</html>
