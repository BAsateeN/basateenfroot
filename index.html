<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بساتين - المتجر المتكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #166534; }
        body { background: #f9fbf7; font-family: 'Cairo', sans-serif; margin: 0; }
        .header-box { background: white; padding: 15px; text-align: center; border-bottom: 2px solid #e2e8f0; position: sticky; top: 0; z-index: 1000; }
        .logo-img { width: 140px; }
        .fancy-title { font-family: 'Amiri', serif; font-size: 28px; color: var(--primary); margin: 5px 0 0 0; }
        .container { max-width: 600px; margin: auto; padding: 20px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px; }
        .tab-btn { white-space: nowrap; padding: 10px 20px; border-radius: 20px; border: 1px solid var(--primary); background: white; cursor: pointer; color: var(--primary); font-weight: bold; }
        .tab-btn.active { background: var(--primary); color: white; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .product-box { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; text-align: center; font-weight: 700; transition: 0.2s; }
        .product-box:active { transform: scale(0.95); }
        .btn-pay { background: #25D366; color: white; width: 100%; padding: 15px; border-radius: 30px; border: none; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div class="header-box">
    <img src="https://k.top4top.io/p_3823l4r0s0.png" class="logo-img">
    <div class="fancy-title">بـسـاتـيـن</div>
</div>

<div class="container">
    <div class="tabs" id="tabs"></div>
    <div class="grid" id="product-grid"></div>
</div>

<script>
    // هنا تقدر تضيف حتى 1000 صنف، الكود سيقرأهم جميعاً ويوزعهم
    const storeData = {
        "فواكه": ["موز 🍌", "تفاح 🍎", "برتقال 🍊", "عنب 🍇", "فراولة 🍓", "مانجو 🥭", "أناناس 🍍", "بطيخ 🍉", "كرز 🍒", "كيوي 🥝", "رمان 🍎", "خوخ 🍑", "إجاص 🍐", "تين 🍏", "توت 🫐"],
        "خضروات": ["طماطم 🍅", "خيار 🥒", "جزر 🥕", "خس 🥬", "بصل 🧅", "ثوم 🧄", "فلفل 🫑", "بروكلي 🥦", "بطاطس 🥔", "كوسة 🥒", "باذنجان 🍆", "ذرة 🌽", "قرنبيط 🥦", "ملفوف 🥬", "بقدونس 🌿"],
        "مكسرات وبذور": ["فول سوداني 🥜", "كستناء 🌰", "لوز 🌰", "جوز 🥥", "فستق 🥜", "كاجو 🥜"],
        "صناديق": ["صندوق العائلة 🎁", "صندوق الفاكهة 🧺", "صندوق الخضار 📦", "صندوق العيد 🎊", "صندوق الضيافة 🍽️"]
    };

    function renderTabs() {
        const tabs = document.getElementById('tabs');
        Object.keys(storeData).forEach((cat, i) => {
            tabs.innerHTML += `<button class="tab-btn ${i==0?'active':''}" onclick="renderGrid('${cat}', this)">${cat}</button>`;
        });
        renderGrid('فواكه');
    }

    function renderGrid(cat, btn) {
        if(btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        const grid = document.getElementById('product-grid');
        grid.innerHTML = '';
        storeData[cat].forEach(item => {
            grid.innerHTML += `<div class="product-box" onclick="sendWhatsApp('${item}')">${item}</div>`;
        });
    }

    function sendWhatsApp(item) {
        window.location.href = "https://wa.me/96598523539?text=" + encodeURIComponent("أريد طلب: " + item + " من متجر بساتين.");
    }

    renderTabs();
</script>
</body>
</html>
