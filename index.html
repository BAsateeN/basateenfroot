<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بساتين - الفخامة المتكاملة</title>
    <style>
        :root { --olive: #556b2f; --gold: #c5a059; --bg: #fdfdf5; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; }

        /* صفحة الترحيب */
        #welcome-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--olive); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; color: white; }
        .farmer-img { font-size: 80px; animation: bounce 2s infinite; margin-bottom: 20px; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .shop-btn { padding: 20px 50px; background: var(--gold); color: white; font-size: 24px; border-radius: 50px; border: none; cursor: pointer; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* المتجر */
        #main-app { display: none; padding-bottom: 100px; }
        .hero { background: var(--olive); padding: 30px; text-align: center; color: white; border-bottom: 5px solid var(--gold); }
        .nav-bar { position: sticky; top: 0; background: white; padding: 15px; display: flex; justify-content: center; gap: 10px; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .nav-btn { padding: 10px 15px; border-radius: 20px; border: 1px solid var(--olive); color: var(--olive); font-weight: bold; cursor: pointer; background: white; }
        .nav-btn.active { background: var(--olive); color: white; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .card { background: white; padding: 15px; border-radius: 20px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .btn-order { background: var(--olive); color: white; border: none; padding: 10px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="welcome-page">
        <div class="farmer-img">👨‍🌾</div>
        <button class="shop-btn" onclick="startShopping()">تسوق الآن</button>
    </div>

    <div id="main-app">
        <header class="hero"><h1>بـسـاتـيـن</h1></header>
        <nav class="nav-bar" id="nav">
            <button class="nav-btn active" onclick="render('الكل', this)">الكل</button>
            <button class="nav-btn" onclick="render('فواكه', this)">فواكه</button>
            <button class="nav-btn" onclick="render('خضروات', this)">خضروات</button>
        </nav>
        <div class="grid" id="grid"></div>
    </div>

    <script>
        const products = [
            {n: "تفاح أخضر 🍏", c: "فواكه"}, {n: "تفاح أحمر 🍎", c: "فواكه"}, {n: "إجاص 🍐", c: "فواكه"}, {n: "برتقال 🍊", c: "فواكه"}, 
            {n: "بطيخ 🍉", c: "فواكه"}, {n: "موز 🍌", c: "فواكه"}, {n: "ليمون 🍋‍🟩", c: "فواكه"}, {n: "ليمون أصفر 🍋", c: "فواكه"}, 
            {n: "عنب 🍇", c: "فواكه"}, {n: "فراولة 🍓", c: "فواكه"}, {n: "توت 🫐", c: "فواكه"}, {n: "شمام 🍈", c: "فواكه"}, 
            {n: "أناناس 🍍", c: "فواكه"}, {n: "مانجو 🥭", c: "فواكه"}, {n: "خوخ 🍑", c: "فواكه"}, {n: "كرز 🍒", c: "فواكه"}, 
            {n: "كيوي 🥝", c: "فواكه"}, {n: "طماطم 🍅", c: "خضروات"}, {n: "باذنجان 🍆", c: "خضروات"}, {n: "خس 🥬", c: "خضروات"}, 
            {n: "بروكلي 🥦", c: "خضروات"}, {n: "بازلاء 🫛", c: "خضروات"}, {n: "أفوكادو 🥑", c: "خضروات"}, {n: "خيار 🥒", c: "خضروات"}, 
            {n: "فلفل حار 🌶️", c: "خضروات"}, {n: "فلفل بارد 🫑", c: "خضروات"}, {n: "ذرة 🌽", c: "خضروات"}, {n: "بصل 🧅", c: "خضروات"}, 
            {n: "ثوم 🧄", c: "خضروات"}, {n: "زيتون 🫒", c: "خضروات"}, {n: "جزر 🥕", c: "خضروات"}, {n: "بطاطس 🥔", c: "خضروات"}, 
            {n: "بطاطا حلوة 🍠", c: "خضروات"}
        ];

        function startShopping() {
            document.getElementById('welcome-page').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            render('الكل');
        }

        function render(cat, btn) {
            if(btn) {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            products.filter(i => cat === 'الكل' || i.c === cat).forEach(item => {
                grid.innerHTML += `
                    <div class="card">
                        <div style="font-weight:bold; margin-bottom:10px">${item.n}</div>
                        <button class="btn-order" onclick="order('${item.n}')">إتمام الطلب 🛒</button>
                    </div>
                `;
            });
        }

        function order(name) {
            window.open(`https://wa.me/96598523539?text=أريد طلب: ${name} من بساتين.`);
        }
    </script>
</body>
</html>
