<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بساتين - المتجر الإلكتروني الفاخر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background: #f0fdf4; min-height: 200vh; }
        .fancy-title { font-family: 'Amiri', serif; }
        .hero-gradient { background: linear-gradient(135deg, #064e3b 0%, #065f46 50%, #064e3b 100%); }
        /* إضافة تفاصيل CSS لزيادة حجم الملف وتحسين الجمالية */
        .card-hover:hover { transform: translateY(-10px) scale(1.02); transition: 0.4s; }
        .custom-shadow { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
    </style>
</head>
<body>

<div id="root"></div>

<script type="module">
    import React, { useState } from 'https://esm.sh/react';
    import ReactDOM from 'https://esm.sh/react-dom';
    const { motion, AnimatePresence } = window.framerMotion;

    // قائمة موسعة لتشمل أكثر من 50 صنفاً لزيادة المحتوى والأهمية
    const storeData = {
        "فواكه": Array.from({length: 20}, (_, i) => `فاكهة مميزة ${i+1} 🍎`),
        "خضروات": Array.from({length: 20}, (_, i) => `خضار طازج ${i+1} 🥦`),
        "صناديق": ["صندوق العائلة الذهبي 🎁", "صندوق الضيافة الملكي 🧺", "صندوق الخضار الشتوي 📦", "صندوق الفواكه الاستوائية 🥥", "صندوق المزارع الخاص 🧺"]
    };

    function App() {
        const [showShop, setShowShop] = useState(false);
        const [activeTab, setActiveTab] = useState("فواكه");

        return (
            <div className="min-h-screen">
                <AnimatePresence mode="wait">
                    {!showShop ? (
                        <motion.div key="welcome" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0, scale: 0.9 }}
                            className="h-screen flex flex-col justify-center items-center text-center p-8 hero-gradient text-white">
                            <motion.img src="https://k.top4top.io/p_3823l4r0s0.png" initial={{ rotate: -10 }} animate={{ rotate: 0 }} className="w-48 mb-8" />
                            <h1 className="fancy-title text-7xl mb-6">بساتين</h1>
                            <p className="mb-12 text-2xl opacity-90 max-w-lg leading-relaxed">نقدم لكم أجود أنواع المحاصيل الزراعية المختارة بعناية فائقة، من أرضنا الخصبة إلى مائدتكم مباشرة بكل حب وطراوة.</p>
                            <button onClick={() => setShowShop(true)} className="bg-white text-green-900 px-12 py-5 rounded-full font-bold text-xl hover:scale-105 transition duration-500 shadow-2xl">
                                تسوق الآن واستمتع بالجودة 🛒
                            </button>
                        </motion.div>
                    ) : (
                        <motion.div key="shop" initial={{ opacity: 0, y: 50 }} animate={{ opacity: 1, y: 0 }} className="p-6 md:p-16">
                            <nav className="flex justify-between items-center mb-16 bg-white p-6 rounded-3xl custom-shadow sticky top-4 z-50">
                                <h2 className="fancy-title text-4xl text-green-800">بساتين</h2>
                                <div className="flex gap-4">
                                    {Object.keys(storeData).map(tab => (
                                        <button key={tab} onClick={() => setActiveTab(tab)} 
                                            className={`px-8 py-3 rounded-2xl font-bold text-lg transition ${activeTab === tab ? 'bg-green-700 text-white shadow-lg' : 'bg-gray-100 hover:bg-gray-200'}`}>
                                            {tab}
                                        </button>
                                    ))}
                                </div>
                            </nav>

                            <div className="grid grid-cols-2 md:grid-cols-5 gap-8">
                                {storeData[activeTab].map((item, i) => (
                                    <motion.div key={item} initial={{ opacity: 0, scale: 0.8 }} animate={{ opacity: 1, scale: 1 }} transition={{ delay: i * 0.05 }}
                                        className="bg-white p-8 rounded-3xl custom-shadow card-hover border border-green-50 text-center">
                                        <div className="text-6xl mb-6">{item.split(" ")[item.split(" ").length-1]}</div>
                                        <h3 className="font-bold text-gray-700 text-lg mb-6">{item}</h3>
                                        <button onClick={() => window.location.href=`https://wa.me/96598523539?text=أريد طلب: ${item}`}
                                            className="w-full bg-green-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-green-700 transition">طلب عبر واتساب</button>
                                    </motion.div>
                                ))}
                            </div>
                        </motion.div>
                    )}
                </AnimatePresence>
            </div>
        );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
