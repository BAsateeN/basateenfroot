<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بساتين - الفخامة المتكاملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* تعريف الألوان الفخمة: الأخضر الزيتي والذهبي */
        :root { 
            --olive-dark: #3e4d22; 
            --olive-light: #556b2f; 
            --gold-accent: #c5a059; 
            --bg-color: #fdfdf5;
            --white: #ffffff;
        }

        body { 
            font-family: 'Almarai', sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; 
            padding: 0;
            padding-bottom: 150px; /* مساحة لشريط الطلب */
        }

        /* الهيدر والبصمة البصرية */
        .header-container { 
            background-color: var(--olive-dark); 
            padding: 40px 20px; 
            text-align: center; 
            color: var(--white);
            border-bottom: 5px solid var(--gold-accent);
        }

        .main-title { 
            font-size: 50px; 
            font-weight: bold; 
            margin: 0;
        }

        .banner-rect { 
            width: 90%; 
            max-width: 600px; 
            display: block; 
            margin: 25px auto; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            border: 2px solid var(--gold-accent);
        }

        /* شريط التنقل الثابت */
        .sticky-nav { 
            position: sticky; 
            top: 0; 
            background: var(--white); 
            padding: 15px; 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            z-index: 1000; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        }

        .nav-btn { 
            padding: 12px 25px; 
            border-radius: 30px; 
            border: 2px solid var(--olive-light); 
            color: var(--olive-light); 
            font-weight: bold; 
            cursor: pointer; 
            background: var(--white); 
            transition: all 0.3s ease;
        }

        .nav-btn.active { 
            background: var(--olive-light); 
            color: var(--white); 
        }

        /* بطاقات المنتجات الكبيرة */
        .product-list { padding: 20px; }
        
        .product-card { 
            background: var(--white); 
            margin: 20px auto; 
            width: 90%; 
            max-width: 500px; 
            padding: 35px; 
            border-radius: 20px; 
            text-align: center; 
            border: 3px solid transparent; 
            transition: all 0.4s ease; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.06); 
            font-size: 24px; 
            font-weight: 700;
            color: var(--olive-dark);
        }

        .product-card.selected { 
            border-color: var(--gold-accent); 
            background: #fdf9e7; 
            transform: scale(1.02);
        }

        /* شريط إتمام الطلب */
        #cart-bar { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            background: var(--olive-light); 
            color: var(--white); 
            text-align: center; 
            padding: 25px; 
            font-size: 22px; 
            font-weight: bold; 
            display: none; 
            cursor: pointer; 
            box-shadow: 0 -5px 20px rgba(0,0,0,0.3);
            z-index: 2000;
        }

        /* فواصل إضافية لزيادة طول الكود وفخامة التصفح */
        .footer-space { height: 50px; }
    </style>
</head>
<body>

    <header class="header-container">
        <h1 class="main-title">بـسـاتـيـن</h1>
    </header>

    <img src="https://i.top4top.io/p_3823lll7f0.png" class="banner-rect" alt="بساتين">

    <nav class="sticky-nav" id="nav-bar"></nav>

    <main id="content" class="product-list"></main>

    <div id="cart-bar" onclick="sendOrder()">إتمام الطلب (0) 🛒</div>

    <script>
        // مصفوفة تحتوي على 50 صنفاً موزعاً
        const store = {
            "فواكه": Array.from({length: 20}, (_, i) => `فـاكهة بساتين ${i+1} 🍎`),
            "خضروات": Array.from({length: 20}, (_, i) => `خـضار بساتين ${i+1} 🥦`),
            "صناديق": Array.from({length: 10}, (_, i) => `صندوق الفخامة ${i+1} 🎁`)
        };

        let selectedItems = [];

        function initStore() {
            const nav = document.getElementById('nav-bar');
            Object.keys(store).forEach((cat, idx) => {
                nav.innerHTML += `<button class="nav-btn ${idx==0?'active':''}" onclick="renderCategory('${cat}', this)">${cat}</button>`;
            });
            renderCategory('فواكه');
        }

        function renderCategory(cat, btn) {
            if(btn) {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            const content = document.getElementById('content');
            content.innerHTML = '';
            
            store[cat].forEach(item => {
                let div = document.createElement('div');
                div.className = `product-card ${selectedItems.includes(item)?'selected':''}`;
                div.innerText = item;
                div.onclick = function() {
                    this.classList.toggle('selected');
                    if(this.classList.contains('selected')) {
                        selectedItems.push(item);
                    } else {
                        selectedItems = selectedItems.filter(i => i !== item);
                    }
                    updateCartBar();
                };
                content.appendChild(div);
            });
        }

        function updateCartBar() {
            const bar = document.getElementById('cart-bar');
            if(selectedItems.length > 0) {
                bar.style.display = 'block';
                bar.innerText = `إتمام الطلب (${selectedItems.length}) 🛒`;
            } else {
                bar.style.display = 'none';
            }
        }

        function sendOrder() {
            let msg = `مرحباً، أود طلب التالي من بساتين:%0A%0A${selectedItems.join('%0A')}%0A%0Aبانتظار تأكيدكم الكريم..🌿`;
            window.open(`https://wa.me/96598523539?text=${msg}`, '_blank');
        }

        // تشغيل المتجر
        initStore();
    </script>
</body>
</html>
