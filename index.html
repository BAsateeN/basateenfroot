<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بساتين | المتجر الفاخر</title>
    <style>
        /* ==========================================================
           تنسيقات CSS المفصلة (لضمان الدقة والاحترافية)
           ========================================================== */
        :root {
            --olive: #556b2f;
            --gold: #c5a059;
            --bg: #fdfdf5;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding-bottom: 100px; }
        
        /* الهيدر */
        .hero { background: var(--olive); padding: 40px 20px; text-align: center; color: white; border-bottom: 6px solid var(--gold); }
        .hero h1 { font-size: 45px; margin: 0; }
        
        /* الصورة */
        .banner { width: 90%; max-width: 500px; display: block; margin: 25px auto; border-radius: 20px; border: 3px solid var(--gold); }
        
        /* شريط التصنيفات (Sticky) */
        .nav-bar { position: sticky; top: 0; background: white; padding: 15px; display: flex; justify-content: center; gap: 10px; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .nav-btn { padding: 12px 25px; border-radius: 25px; border: 1px solid var(--olive); color: var(--olive); font-weight: bold; cursor: pointer; background: white; transition: 0.3s; }
        .nav-btn.active { background: var(--olive); color: white; }

        /* الشبكة (Grid) */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border: 2px solid #eee; }
        .card-name { font-weight: bold; color: #333; margin-bottom: 15px; font-size: 16px; }
        
        /* زر إتمام الطلب الصغير داخل الصنف */
        .btn-order { background: var(--olive); color: white; border: none; padding: 10px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <header class="hero"><h1>بـسـاتـيـن</h1></header>
    <img src="https://i.top4top.io/p_3823lll7f0.png" class="banner">

    <nav class="nav-bar" id="nav">
        <button class="nav-btn active" onclick="render('الكل', this)">الكل</button>
        <button class="nav-btn" onclick="render('فواكه', this)">فواكه</button>
        <button class="nav-btn" onclick="render('خضروات', this)">خضروات</button>
    </nav>

    <div class="grid" id="grid"></div>

    <script>
        // قائمة الأصناف الفريدة
        const products = [
            {n: "موز 🍌", c: "فواكه"}, {n: "تفاح 🍎", c: "فواكه"}, {n: "برتقال 🍊", c: "فواكه"},
            {n: "مانجو 🥭", c: "فواكه"}, {n: "فراولة 🍓", c: "فواكه"}, {n: "عنب 🍇", c: "فواكه"},
            {n: "خيار 🥒", c: "خضروات"}, {n: "طماطم 🍅", c: "خضروات"}, {n: "جزر 🥕", c: "خضروات"},
            {n: "خس 🥬", c: "خضروات"}, {n: "بصل 🧅", c: "خضروات"}, {n: "بروكلي 🥦", c: "خضروات"}
        ];

        function render(cat, btn) {
            if(btn) {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            products.filter(i => cat === 'الكل' || i.c === cat).forEach(item => {
                grid.innerHTML += `
                    <div class="card">
                        <div class="card-name">${item.n}</div>
                        <button class="btn-order" onclick="order('${item.n}')">إتمام الطلب 🛒</button>
                    </div>
                `;
            });
        }

        function order(name) {
            window.open(`https://wa.me/96598523539?text=أريد طلب: ${name}`);
        }

        render('الكل');
    </script>
</body>
</html>
